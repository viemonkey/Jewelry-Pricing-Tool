version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: jewelry-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  backend:
    build:
      context: ./Jewelry-Pricing-Tool-BE-2
      dockerfile: Dockerfile
    container_name: jewelry-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/Jewelry-Pricing-Tool
      - FE_URL=http://localhost:3001
    depends_on:
      - mongodb
    volumes:
      - backend-uploads:/app/uploads
    restart: always

  frontend:
    build:
      context: ./Jewelry-Pricing-Tool-FE
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3000
    container_name: jewelry-frontend
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: always

volumes:
  mongo-data:
  backend-uploads:
